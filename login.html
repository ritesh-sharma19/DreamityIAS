<!doctype html>
<html lang="en">
<head>
  <style>
    header nav ul {
      display: flex;
      gap: 40px;
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 2px 8px rgba(44,44,44,0.10);
      padding: 8px 32px;
      margin-left: 32px;
      align-items: center;
      list-style: none;
    }
    header nav ul li {
      display: flex;
      align-items: center;
    }
    header nav ul li a {
      color: #1a395e;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.08rem;
      padding: 8px 16px;
      border-radius: 18px;
      transition: background 0.2s, color 0.2s;
    }
    header nav ul li a:hover {
      background: #eaf6fa;
      color: #f6a623;
    }
    .auth-container {
      max-width: 900px;
      margin: 60px auto;
      display: flex;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(44,44,44,0.10);
      overflow: hidden;
    }
    .auth-left {
      flex: 1;
      background: linear-gradient(#dfe0e0, #2a7a8c 60%, #1c4d59 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px 0;
    }
    .auth-left img {
      width: 250px;
      border-radius: 18px;
      box-shadow: 0 2px 16px rgba(44,44,44,0.10);
    }
    .auth-right {
      flex: 1;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .auth-tabs {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
      border-bottom: 2px solid #eaf6fa;
    }
    .auth-tab {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a395e;
      padding-bottom: 8px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .auth-tab.active {
      color: #f6a623;
      border-bottom: 3px solid #f6a623;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .auth-form label {
      font-weight: 600;
      color: #1a395e;
      margin-bottom: 4px;
    }
    .auth-form input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #eaf6fa;
      font-size: 1rem;
      background: #f7f7f7;
      margin-bottom: 8px;
    }
    .auth-form button {
      background: #1a395e;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      padding: 12px 0;
      margin-top: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(44,44,44,0.10);
      transition: background 0.2s;
    }
    .auth-form button:hover {
      background: #f6a623;
    }
    .auth-form .error {
      color: #d32f2f;
      font-size: 0.98rem;
      margin-top: -8px;
    }
    @media (max-width: 900px) {
      .auth-container { flex-direction: column; }
      .auth-left, .auth-right { padding: 32px 16px; }
    }
  </style>
  <meta charset="utf-8" />

  <div class="auth-container">
    <div class="auth-left">
      <img src="fb44c860-c8eb-475b-9d3f-8d34e4be29da.jpg" />
    </div>
    <div class="auth-right">
      <div class="auth-tabs">
        <span class="auth-tab active" id="loginTab">Login</span>
        <span class="auth-tab" id="signupTab">Sign Up</span>
      </div>
      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required placeholder="Enter your email" />
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required placeholder="Enter your password" />
        <button type="submit">Login</button>
        <div id="loginError" class="error"></div>
      </form>
      <form id="signupForm" class="auth-form" style="display:none;">
        <label for="signupName">Name</label>
        <input type="text" id="signupName" required placeholder="Enter your name" />
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" required placeholder="Enter your email" />
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" required placeholder="Create a password" />
        <button type="submit">Sign Up</button>
        <div id="signupError" class="error"></div>
      </form>
    </div>
  </div>
  <script>
    // Tab switch logic
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    loginTab.onclick = function() {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.style.display = '';
      signupForm.style.display = 'none';
    };
    signupTab.onclick = function() {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.style.display = '';
      loginForm.style.display = 'none';
    };
  </script>
